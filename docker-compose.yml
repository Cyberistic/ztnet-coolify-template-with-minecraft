services:
  postgres:
    image: postgres:15.2-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=ztnet
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ztnet"]
      interval: 10s
      timeout: 5s
      retries: 5

  zerotier:
    image: zyclonite/zerotier:1.14.2
    hostname: zerotier
    restart: unless-stopped
    volumes:
      - zerotier:/var/lib/zerotier-one
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9994:9993/udp" # To avoid conflict with the zerotier instance installed outside of docker, I remapped this instance to be listening on port 9994
    environment:
      - ZT_OVERRIDE_LOCAL_CONF=true
      - ZT_ALLOW_MANAGEMENT_FROM=0.0.0.0/0

  ztnet:
    image: sinamics/ztnet:latest
    hostname: ztnet
    working_dir: /app
    volumes:
      - zerotier:/var/lib/zerotier-one
    restart: unless-stopped
    environment:
      # Coolify magic variable - generates FQDN and routes to port 3000
      - SERVICE_FQDN_ZTNET_3000

      # ZeroTier controller configuration
      - ZT_ADDR=http://zerotier:9993

      # PostgreSQL connection
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=ztnet

      # NextAuth configuration
      # NEXTAUTH_URL will be auto-set by Coolify via SERVICE_FQDN_ZTNET_3000
      - NEXTAUTH_URL=${SERVICE_FQDN_ZTNET_3000}
      - NEXTAUTH_SECRET=${SERVICE_PASSWORD_64_ZTNET}
      - NEXTAUTH_URL_INTERNAL=http://ztnet:3000
    depends_on:
      postgres:
        condition: service_healthy
      zerotier:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://ztnet:3000', {redirect: 'manual'}).then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  zerotier:
  postgres-data:
