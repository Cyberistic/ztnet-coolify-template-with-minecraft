services:
  zerotier:
    image: zyclonite/zerotier:latest
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - zerotier-data:/var/lib/zerotier-one
    environment:
      - ZEROTIER_NETWORK_ID=${ZEROTIER_NETWORK_ID}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /var/lib/zerotier-one/networks.d
        touch /var/lib/zerotier-one/networks.d/$${ZEROTIER_NETWORK_ID}.conf
        exec /usr/sbin/entrypoint.sh zerotier-one -U
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "zerotier-cli", "listnetworks"]
      interval: 30s
      timeout: 10s
      retries: 3

  mc:
    image: itzg/minecraft-server
    network_mode: "service:zerotier"
    environment:
      - EULA=true
      - "VERSION=${MINECRAFT_VERSION:-latest}"
      - "TYPE=${MINECRAFT_TYPE:-VANILLA}"
      - "SERVER_NAME=${MINECRAFT_SERVER_NAME:-Minecraft Server}"
      - "MOTD=${MINECRAFT_MOTD:-Minecraft Server powered by ZeroTier}"
      - "DIFFICULTY=${MINECRAFT_DIFFICULTY:-normal}"
      - "MAX_PLAYERS=${MINECRAFT_MAX_PLAYERS:-10}"
      - "MAX_WORLD_SIZE=${MINECRAFT_MAX_WORLD_SIZE:-10000}"
      - "VIEW_DISTANCE=${MINECRAFT_VIEW_DISTANCE:-10}"
      - "MAX_BUILD_HEIGHT=${MINECRAFT_MAX_BUILD_HEIGHT:-256}"
      - "MAX_TICK_TIME=${MINECRAFT_MAX_TICK_TIME:-60000}"
      - "ALLOW_NETHER=${MINECRAFT_ALLOW_NETHER:-true}"
      - "ANNOUNCE_PLAYER_ACHIEVEMENTS=${MINECRAFT_ANNOUNCE_PLAYER_ACHIEVEMENTS:-true}"
      - "GENERATE_STRUCTURES=${MINECRAFT_GENERATE_STRUCTURES:-true}"
      - "PVP=${MINECRAFT_PVP:-true}"
      - "MODE=${MINECRAFT_GAME_MODE:-survival}"
      - "FORCE_GAMEMODE=${MINECRAFT_FORCE_GAMEMODE:-false}"
      - "HARDCORE=${MINECRAFT_HARDCORE:-false}"
      - "ENABLE_COMMAND_BLOCK=${MINECRAFT_ENABLE_COMMAND_BLOCK:-false}"
      - "SPAWN_ANIMALS=${MINECRAFT_SPAWN_ANIMALS:-true}"
      - "SPAWN_MONSTERS=${MINECRAFT_SPAWN_MONSTERS:-true}"
      - "SPAWN_NPCS=${MINECRAFT_SPAWN_NPCS:-true}"
      - "SNOOPER_ENABLED=${MINECRAFT_SNOOPER_ENABLED:-false}"
      - "ONLINE_MODE=${MINECRAFT_ONLINE_MODE:-true}"
      - "PLAYER_IDLE_TIMEOUT=${MINECRAFT_PLAYER_IDLE_TIMEOUT:-0}"
      - "INIT_MEMORY=${MINECRAFT_INIT_MEMORY:-256M}"
      - "MAX_MEMORY=${MINECRAFT_MAX_MEMORY:-1G}"
      - "GUI=${MINECRAFT_GUI:-false}"
      - "ENABLE_AUTOPAUSE=${MINECRAFT_ENABLE_AUTOPAUSE:-false}"
      - "RCON_PASSWORD=${SERVICE_PASSWORD_RCON:-minecraft}"
      - "ENABLE_RCON=true"
    volumes:
      - minecraft-data:/data
    depends_on:
      zerotier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/mc-monitor", "status", "--host", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  filebrowser:
    image: filebrowser/filebrowser:latest
    network_mode: "service:zerotier"
    environment:
      - FB_DATABASE=/config/filebrowser.db
      - FB_ROOT=/data
      - FB_PORT=8080
      - FB_BASEURL=/
    volumes:
      - minecraft-data:/data
      - filebrowser-config:/config
      - minecraft-backups:/backups
    depends_on:
      zerotier:
        condition: service_healthy
    restart: unless-stopped

  backups:
    image: itzg/mc-backup
    environment:
      - RCON_HOST=localhost
      - RCON_PORT=25575
      - "RCON_PASSWORD=${SERVICE_PASSWORD_RCON:-minecraft}"
      # Backup every 6 hours
      - "BACKUP_INTERVAL=${BACKUP_INTERVAL:-6h}"
      # Wait 2 minutes before first backup
      - INITIAL_DELAY=2m
      # Keep backups for 7 days
      - "PRUNE_BACKUPS_DAYS=${PRUNE_BACKUPS_DAYS:-7}"
      - BACKUP_METHOD=tar
      - TAR_COMPRESS_METHOD=gzip
      # Pause backups if no players online
      - "PAUSE_IF_NO_PLAYERS=${PAUSE_IF_NO_PLAYERS:-false}"
      - DEST_DIR=/backups
      - BACKUP_NAME=world
      - "TZ=${TZ:-UTC}"
    volumes:
      - minecraft-data:/data:ro
      - minecraft-backups:/backups
    # Share network with zerotier so RCON can reach mc on localhost
    network_mode: "service:zerotier"
    depends_on:
      mc:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zerotier-data:
  minecraft-data:
  minecraft-backups:
  filebrowser-config:
